<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/large.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="directory.html">Directory</a></li>
        <li><a href="join.html">Join</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Thank You for Joining!</h1>
    <p>We appreciate your application. Here is the information you submitted:</p>

    <div id="submittedData"></div>
  </main>

  <footer>
    <p>&copy; 2026 Santa Lucía Chamber of Commerce</p>
  </footer>

  <script>
    // Display submitted form data
    const params = new URLSearchParams(window.location.search);
    const output = `
      <p><strong>First Name:</strong> ${params.get("firstName")}</p>
      <p><strong>Last Name:</strong> ${params.get("lastName")}</p>
      <p><strong>Email:</strong> ${params.get("email")}</p>
      <p><strong>Mobile Phone:</strong> ${params.get("phone")}</p>
      <p><strong>Organization:</strong> ${params.get("organization")}</p>
      <p><strong>Timestamp:</strong> ${params.get("timestamp")}</p>
    `;
    document.getElementById("submittedData").innerHTML = output;
  </script>
</body>
</html>
