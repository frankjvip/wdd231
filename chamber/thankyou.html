<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Santa Lucía Chamber</title>
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/large.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="directory.html">Directory</a></li>
        <li><a href="join.html">Join</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Thank You for Joining!</h1>
    <div id="confirmation"></div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Santa Lucía Chamber | Last Modified: <span id="lastModified"></span></p>
  </footer>
  <script src="scripts/date.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("confirmation").innerHTML = `
      <p><strong>First Name:</strong> ${params.get("firstName")}</p>
      <p><strong>Last Name:</strong> ${params.get("lastName")}</p>
      <p><strong>Email:</strong> ${params.get("email")}</p>
      <p><strong>Phone:</strong> ${params.get("phone")}</p>
      <p><strong>Organization:</strong> ${params.get("organization")}</p>
      <p><strong>Date Submitted:</strong> ${params.get("timestamp")}</p>
    `;
  </script>
</body>
</html>
