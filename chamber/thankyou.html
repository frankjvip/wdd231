<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Santa Lucía Chamber</title>
  <meta name="description" content="Thank you for joining the Santa Lucía Chamber of Commerce.">
  <meta name="author" content="Franklin [Tu Apellido]">
  <link rel="icon" href="images/favicon.ico">

  <!-- Open Graph Metadata -->
  <meta property="og:title" content="Thank You - Santa Lucía Chamber">
  <meta property="og:description" content="Your membership application has been submitted successfully.">
  <meta property="og:image" content="https://franklin.github.io/chamber/images/og-image.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/large.css">

  <!-- Scripts moved to head with defer -->
  <script src="scripts/date.js" defer></script>
  <script defer>
    const params = new URLSearchParams(window.location.search);
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("confirmation").innerHTML = `
        <p><strong>First Name:</strong> ${params.get("firstName")}</p>
        <p><strong>Last Name:</strong> ${params.get("lastName")}</p>
        <p><strong>Email:</strong> ${params.get("email")}</p>
        <p><strong>Phone:</strong> ${params.get("phone")}</p>
        <p><strong>Organization:</strong> ${params.get("organization")}</p>
        <p><strong>Date Submitted:</strong> ${params.get("timestamp")}</p>
      `;
    });
  </script>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>

      </ul>
    </nav>
  </header>

  <main>
    <h1>Thank You for Joining!</h1>
    <div id="confirmation"></div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Santa Lucía Chamber | Last Modified: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
